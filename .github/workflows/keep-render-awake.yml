name: Keep Render Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            https://portafolio-jr-backend.onrender.com/api/health
